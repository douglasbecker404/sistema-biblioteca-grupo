<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotecaa – Aluguel de Livros</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Tela Inicial -->
        <div id="inicio" class="tela ativa">
            <h1>📚 Biblioteca Central</h1>
            <p>Selecione a operação desejada:</p>
            <div class="botoes">
                <button onclick="mostrar('aluguel-opcao')">📖 Alugar Livro</button>
                <button onclick="mostrar('devolucao')">📥 Devolver Livro</button>
            </div>
        </div>

        <!-- Tela: Novo ou Antigo? -->
        <div id="aluguel-opcao" class="tela">
            <h2>Novo Aluguel</h2>
            <p>O cliente já possui cadastro?</p>
            <div class="botoes">
                <button onclick="mostrar('cadastro-novo')">✨ Cliente Novo</button>
                <button onclick="mostrar('pedido')">👤 Cliente Antigo</button>
                <button class="voltar" onclick="mostrar('inicio')">↩ Voltar</button>
            </div>
        </div>

        <!-- Tela: Cadastro de novo cliente -->
        <div id="cadastro-novo" class="tela">
            <h2>Cadastro de Cliente</h2>
            <form id="form-cadastro" onsubmit="event.preventDefault(); cadastrar();">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Ex: Ana Maria Ferreira" required>

                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>

                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento" required>

                <button type="submit">Cadastrar Cliente</button>
            </form>
            <button class="voltar" onclick="mostrar('aluguel-opcao')">↩ Voltar</button>
        </div>

        <!-- Tela: Pedido de aluguel (com lista de livros populares) -->
        <div id="pedido" class="tela">
            <h2>Realizar Pedido</h2>
            <form id="form-pedido" onsubmit="event.preventDefault(); confirmarAluguel();">
                <label for="cliente-select">Cliente</label>
                <select id="cliente-select" required>
                    <option value="">Selecione o cliente...</option>
                    <option>João Silva</option>
                    <option>Maria Oliveira</option>
                    <option>Carlos Souza</option>
                    <option>Ana Clara Santos</option>
                </select>

                <label for="livro">Nome do Livro</label>
                <input type="text" id="livro" placeholder="Digite o título do livro" required>

                <!-- Filtro de livros populares -->
                <div class="busca-livros">
                    <label for="filtro-livro">🔎 Filtrar lista de livros populares</label>
                    <input type="text" id="filtro-livro" placeholder="Pesquise na lista..." oninput="filtrarLivros()">
                    <div id="lista-livros" class="lista-livros"></div>
                </div>

                <label for="data-locacao">Data da Locação</label>
                <input type="date" id="data-locacao" required onchange="calcularDevolucao()">

                <label for="data-devolucao">Data de Devolução (7 dias)</label>
                <input type="text" id="data-devolucao" readonly placeholder="Automático ao selecionar data">

                <button type="submit">✅ Confirmar Aluguel</button>
            </form>
            <button class="voltar" onclick="mostrar('inicio')">↩ Cancelar</button>
        </div>

        <!-- Tela: Devolução -->
        <div id="devolucao" class="tela">
            <h2>Devolução de Livro</h2>
            <div id="busca-cliente">
                <label for="nome-cliente-devolucao">Nome do Cliente</label>
                <input type="text" id="nome-cliente-devolucao" placeholder="Digite o nome do cliente">
                <button onclick="buscarCliente()" style="margin-top: 15px; width: 100%;">🔍 Buscar</button>
            </div>

            <div id="info-devolucao" style="display: none;">
                <p>📘 Livro alugado: <span id="livro-alugado"></span></p>
                <button onclick="devolver()">📦 Confirmar Devolução</button>
            </div>
            <button class="voltar" onclick="mostrar('inicio')" style="margin-top: 20px;">↩ Voltar ao início</button>
        </div>
    </div>

    <script>
        // Lista dos 100 livros mais populares
        const livrosPopulares = [
            "Dom Quixote - Miguel de Cervantes",
            "1984 - George Orwell",
            "Orgulho e Preconceito - Jane Austen",
            "O Senhor dos Anéis - J.R.R. Tolkien",
            "Cem Anos de Solidão - Gabriel García Márquez",
            "Harry Potter e a Pedra Filosofal - J.K. Rowling",
            "O Apanhador no Campo de Centeio - J.D. Salinger",
            "O Grande Gatsby - F. Scott Fitzgerald",
            "Crime e Castigo - Fiódor Dostoiévski",
            "Guerra e Paz - Liev Tolstói",
            "As Aventuras de Tom Sawyer - Mark Twain",
            "Moby Dick - Herman Melville",
            "Ulisses - James Joyce",
            "O Processo - Franz Kafka",
            "Ensaio sobre a Cegueira - José Saramago",
            "A Metamorfose - Franz Kafka",
            "O Pequeno Príncipe - Antoine de Saint-Exupéry",
            "A Divina Comédia - Dante Alighieri",
            "Hamlet - William Shakespeare",
            "Romeu e Julieta - William Shakespeare",
            "Os Miseráveis - Victor Hugo",
            "O Conde de Monte Cristo - Alexandre Dumas",
            "Jane Eyre - Charlotte Brontë",
            "O Morro dos Ventos Uivantes - Emily Brontë",
            "Anna Kariênina - Liev Tolstói",
            "A Revolução dos Bichos - George Orwell",
            "Fahrenheit 451 - Ray Bradbury",
            "Admirável Mundo Novo - Aldous Huxley",
            "O Sol é para Todos - Harper Lee",
            "O Lobo da Estepe - Hermann Hesse",
            "Sidarta - Hermann Hesse",
            "A Náusea - Jean-Paul Sartre",
            "O Estrangeiro - Albert Camus",
            "A Peste - Albert Camus",
            "Doutor Jivago - Boris Pasternak",
            "Lolita - Vladimir Nabokov",
            "Memórias Póstumas de Brás Cubas - Machado de Assis",
            "Dom Casmurro - Machado de Assis",
            "Grande Sertão: Veredas - João Guimarães Rosa",
            "Vidas Secas - Graciliano Ramos",
            "Capitães da Areia - Jorge Amado",
            "Gabriela, Cravo e Canela - Jorge Amado",
            "O Tempo e o Vento - Érico Veríssimo",
            "A Hora da Estrela - Clarice Lispector",
            "Água Viva - Clarice Lispector",
            "Memorial de Aires - Machado de Assis",
            "São Bernardo - Graciliano Ramos",
            "Angústia - Graciliano Ramos",
            "Macunaíma - Mário de Andrade",
            "O Cortiço - Aluísio Azevedo",
            "Lucíola - José de Alencar",
            "Senhora - José de Alencar",
            "Iracema - José de Alencar",
            "O Guarani - José de Alencar",
            "Quincas Borba - Machado de Assis",
            "O Alienista - Machado de Assis",
            "A Moreninha - Joaquim Manuel de Macedo",
            "Noite na Taverna - Álvares de Azevedo",
            "Lira dos Vinte Anos - Álvares de Azevedo",
            "Poemas - Carlos Drummond de Andrade",
            "Morte e Vida Severina - João Cabral de Melo Neto",
            "O Quinze - Rachel de Queiroz",
            "A Bagaceira - José Américo de Almeida",
            "O Auto da Compadecida - Ariano Suassuna",
            "O Pagador de Promessas - Dias Gomes",
            "Os Sertões - Euclides da Cunha",
            "Casa-Grande & Senzala - Gilberto Freyre",
            "Raízes do Brasil - Sérgio Buarque de Holanda",
            "O Povo Brasileiro - Darcy Ribeiro",
            "Brasil: Uma Biografia - Lilia M. Schwarcz & Heloisa M. Starling",
            "O Homem que Calculava - Malba Tahan",
            "Pollyanna - Eleanor H. Porter",
            "Anne de Green Gables - Lucy Maud Montgomery",
            "As Crônicas de Nárnia - C.S. Lewis",
            "O Hobbit - J.R.R. Tolkien",
            "Jogos Vorazes - Suzanne Collins",
            "Divergente - Veronica Roth",
            "A Seleção - Kiera Cass",
            "Cidades de Papel - John Green",
            "A Culpa é das Estrelas - John Green",
            "Extraordinário - R.J. Palacio",
            "O Diário de Anne Frank - Anne Frank",
            "A Menina que Roubava Livros - Markus Zusak",
            "O Código Da Vinci - Dan Brown",
            "Anjos e Demônios - Dan Brown",
            "Inferno - Dan Brown",
            "O Símbolo Perdido - Dan Brown",
            "Fortaleza Digital - Dan Brown",
            "A Garota no Trem - Paula Hawkins",
            "O Silêncio dos Inocentes - Thomas Harris",
            "Psicose - Robert Bloch",
            "O Iluminado - Stephen King",
            "It: A Coisa - Stephen King",
            "Doutor Sono - Stephen King",
            "Carrie, a Estranha - Stephen King",
            "A Dança da Morte - Stephen King",
            "O Nome da Rosa - Umberto Eco",
            "O Perfume - Patrick Süskind",
            "Clube da Luta - Chuck Palahniuk",
            "A Sombra do Vento - Carlos Ruiz Zafón",
            "O Jogo do Anjo - Carlos Ruiz Zafón",
            "Marina - Carlos Ruiz Zafón",
            "As Vinhas da Ira - John Steinbeck",
            "Ratos e Homens - John Steinbeck"
        ];

        function filtrarLivros() {
            const filtro = document.getElementById('filtro-livro').value.toLowerCase();
            const listaDiv = document.getElementById('lista-livros');
            listaDiv.innerHTML = '';

            if (filtro.trim() === '') {
                listaDiv.style.display = 'none';
                return;
            }

            const resultados = livrosPopulares.filter(livro => livro.toLowerCase().includes(filtro));
            if (resultados.length === 0) {
                listaDiv.innerHTML = '<div class="sem-resultados">Nenhum livro encontrado</div>';
                listaDiv.style.display = 'block';
                return;
            }

            resultados.forEach(livro => {
                const item = document.createElement('div');
                item.className = 'item-livro';
                item.textContent = livro;
                item.addEventListener('click', function() {
                    document.getElementById('livro').value = livro.split(' - ')[0]; // preenche só o título
                    document.getElementById('filtro-livro').value = '';
                    listaDiv.innerHTML = '';
                    listaDiv.style.display = 'none';
                });
                listaDiv.appendChild(item);
            });
            listaDiv.style.display = 'block';
        }

        // Fecha a lista ao clicar fora (opcional)
        document.addEventListener('click', function(event) {
            const listaDiv = document.getElementById('lista-livros');
            const filtroInput = document.getElementById('filtro-livro');
            if (!event.target.closest('.busca-livros')) {
                listaDiv.style.display = 'none';
                if (document.activeElement !== filtroInput) {
                    filtroInput.value = '';
                }
            }
        });

        // Navegação entre telas (mantida)
        function mostrar(id) {
            document.querySelectorAll('.tela').forEach(tela => tela.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            if (id === 'inicio') limparFormularios();
        }

        function limparFormularios() {
            document.querySelectorAll('input:not([readonly]), select').forEach(el => {
                if (el.type !== 'submit' && el.type !== 'button') el.value = '';
            });
            document.getElementById('data-devolucao').value = '';
            document.getElementById('info-devolucao').style.display = 'none';
            document.getElementById('lista-livros').innerHTML = '';
            document.getElementById('lista-livros').style.display = 'none';
            document.getElementById('filtro-livro').value = '';
        }

        function calcularDevolucao() {
            const dataLocacao = document.getElementById('data-locacao').value;
            const campoDevolucao = document.getElementById('data-devolucao');
            if (dataLocacao) {
                const data = new Date(dataLocacao);
                data.setDate(data.getDate() + 7);
                const dia = String(data.getDate()).padStart(2, '0');
                const mes = String(data.getMonth() + 1).padStart(2, '0');
                const ano = data.getFullYear();
                campoDevolucao.value = `${dia}/${mes}/${ano}`;
            } else {
                campoDevolucao.value = '';
            }
        }

        function cadastrar() {
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const nasc = document.getElementById('nascimento').value;
            if (!nome || !cpf || !nasc) { alert('Preencha todos os campos.'); return; }
            alert(`Cliente ${nome} cadastrado com sucesso! Prossiga com o aluguel.`);
            const select = document.getElementById('cliente-select');
            const option = document.createElement('option');
            option.text = nome;
            select.add(option);
            select.value = nome;
            document.getElementById('form-cadastro').reset();
            mostrar('pedido');
        }

        function confirmarAluguel() {
            const cliente = document.getElementById('cliente-select').value;
            const livro = document.getElementById('livro').value.trim();
            const dataLoc = document.getElementById('data-locacao').value;
            const dataDev = document.getElementById('data-devolucao').value;
            if (!cliente || !livro || !dataLoc) { alert('Preencha todos os campos do pedido.'); return; }
            alert(`Aluguel registrado!\nCliente: ${cliente}\nLivro: "${livro}"\nDevolução em: ${dataDev}`);
            document.getElementById('form-pedido').reset();
            document.getElementById('data-devolucao').value = '';
            mostrar('inicio');
        }

        function buscarCliente() {
            const nomeBusca = document.getElementById('nome-cliente-devolucao').value.trim().toLowerCase();
            const nomesConhecidos = ['joão silva', 'maria oliveira', 'carlos souza', 'ana clara santos'];
            const livros = {
                'joão silva': 'Dom Casmurro',
                'maria oliveira': 'A Moreninha',
                'carlos souza': 'O Cortiço',
                'ana clara santos': 'Capitães da Areia'
            };
            if (nomeBusca === '') { alert('Digite um nome para buscar.'); return; }
            const encontrado = nomesConhecidos.find(n => n.includes(nomeBusca));
            if (encontrado && livros[encontrado]) {
                document.getElementById('livro-alugado').textContent = `"${livros[encontrado]}" (cliente: ${encontrado})`;
            } else {
                document.getElementById('livro-alugado').textContent = `"Livro Exemplo" (cliente não encontrado na base simulada)`;
            }
            document.getElementById('info-devolucao').style.display = 'block';
        }

        function devolver() {
            const nomeCliente = document.getElementById('nome-cliente-devolucao').value.trim();
            const livroInfo = document.getElementById('livro-alugado').textContent;
            alert(`Devolução confirmada!\nCliente: ${nomeCliente}\nLivro: ${livroInfo}`);
            document.getElementById('nome-cliente-devolucao').value = '';
            document.getElementById('info-devolucao').style.display = 'none';
            mostrar('inicio');
        }
    </script>
</body>
</html>
